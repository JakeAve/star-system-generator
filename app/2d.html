<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Canvas Viewer</title>
    <link rel="icon" href="./favicon.ico">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000;
        overflow: hidden;
        touch-action: none;
      }
      canvas {
        display: block;
      }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        color: #888;
        font-family: monospace;
        font-size: 0.85rem;
        letter-spacing: 0.1em;
      }
      #top-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
        z-index: 15;
        pointer-events: none;
      }
      #nav-links {
        display: flex;
        gap: 0.375rem;
        flex-shrink: 0;
        pointer-events: auto;
      }
      .nav-link {
        padding: 0.375rem 0.625rem;
        background: rgba(0, 0, 0, 0.75);
        border: 1px solid #2a2a3a;
        border-radius: 0.25rem;
        color: #ccc;
        font-family: monospace;
        font-size: 0.6875rem;
        letter-spacing: 0.05em;
        text-decoration: none;
      }
      .nav-link:hover {
        border-color: #555;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div id="route-tip" style="position:fixed; pointer-events:none; z-index:20;
  display:none; background:rgba(0,0,0,0.9); border:1px solid #2a2a3a;
  border-radius:4px; padding:0.35rem 0.55rem; color:#eee; font-family:monospace;
  font-size:0.75rem; line-height:1.35; white-space:nowrap;"></div>
    <div id="loading">LOADING...</div>
    <script type="module">
      import {
        buildViewModel,
        generateSolarSystem,
        parseViewState,
        resolveFocusMode,
        roleDisplayName,
        routeViewsForPick,
        serializeViewState,
      } from "./star-seeder.bundle.js";
      import { createCanvasOrrery } from "./orrery-2d.bundle.js";
      import { loadSystem, saveSystem } from "./storage.js";
      import { buildPanel } from "./panel.js";
      import { buildPlaybackWidget } from "./playback-widget.js";

      const numericId = parseInt(location.hash.slice(1), 10);
      if (isNaN(numericId)) {
        location.href = "./index.html";
      } else {
        const topBar = document.createElement("div");
        topBar.id = "top-bar";

        const nav = document.createElement("div");
        nav.id = "nav-links";

        const genLink = document.createElement("a");
        genLink.className = "nav-link";
        genLink.href = "./index.html";
        genLink.textContent = "← SEEDS";

        const viewLink = document.createElement("a");
        viewLink.className = "nav-link";
        viewLink.href = `./3d.html#${numericId}`;
        viewLink.textContent = "⇄ 3D VIEW";

        nav.append(genLink, viewLink);
        topBar.appendChild(nav);
        document.body.appendChild(topBar);

        const loadingEl = document.getElementById("loading");
        let data = loadSystem(numericId);
        if (!data) {
          try {
            data = generateSolarSystem({ seed: numericId });
            saveSystem(data);
          } catch (err) {
            if (loadingEl) loadingEl.textContent = `Error: ${err.message}`;
          }
        }
        if (data) {
          if (loadingEl) loadingEl.remove();
          const fmtDuration = (days) =>
            days >= 365 ? `${(days / 365).toFixed(1)} yr` : `${days.toFixed(0)} d`;
          const routeTip = document.getElementById("route-tip");
          const animObjects = buildViewModel(data, 0);
          const knownIds = new Set(animObjects.map((o) => o.id));
          const initial = parseViewState(location.search);
          const state = {
            hl: initial.hl.filter((id) => knownIds.has(id)),
            focus: initial.focus.filter((id) => knownIds.has(id)),
            mode: initial.mode,
          };

          function writeURL() {
            const qs = serializeViewState(state);
            const url = location.pathname + (qs ? "?" + qs : "") +
              location.hash;
            history.replaceState(null, "", url);
          }

          let panelHandle;  // declared before orrery so onRoutePick can close over it
          let currentRouteViews = [];

          const orrery = createCanvasOrrery(document.body, {
            onPick: (id) => {
              highlightOnly(id);
              const obj = animObjects.find((o) => o.id === id);
              if (obj) {
                document.dispatchEvent(
                  new CustomEvent("bodySelected", { detail: obj }),
                );
              }
            },
            onLockBreak: () => {
              if (state.focus.length === 0) return;
              state.mode = "frame";
              writeURL();
            },
            onRouteHover: (info, sx, sy) => {
              if (!info) { routeTip.style.display = "none"; return; }
              // roleDisplayName returns from a static map; no user input reaches innerHTML.
              routeTip.innerHTML =
                `<strong>${roleDisplayName(info.role)}</strong><br>` +
                `Δv ${info.totalDeltaV.toFixed(2)} km/s<br>` +
                `time ${fmtDuration(info.duration)}`;
              routeTip.style.display = "block";
              routeTip.style.left = `${sx + 14}px`;
              routeTip.style.top = `${sy + 14}px`;
            },
            onRoutePick: (t) => {
              const view = currentRouteViews.find((v) => v.id === t.routeId);
              if (view) panelHandle?.showRoute(view);
            },
          });

          const routeSel = { phase: "idle", from: null };

          function drawRoutesFor(fromId, toId) {
            try {
              const views = routeViewsForPick(data, fromId, toId, orrery.getCurrentDay());
              if (views.length === 0) {
                orrery.setRoutes([]);
                currentRouteViews = [];
                console.warn(`No routes found ${fromId} -> ${toId}`);
                return;
              }
              orrery.setRoutes(views);
              currentRouteViews = views;
            } catch (err) {
              orrery.setRoutes([]);
              currentRouteViews = [];
              console.warn(`Route error: ${err.message}`);
            }
          }

          // Highlight a body without moving the camera (canvas click / panel row select).
          function highlightOnly(id) {
            state.hl = [id];
            state.focus = [];
            orrery.setHighlight([id]);
            writeURL();
          }

          // Highlight AND fly/lock the camera to a body (the "Fly to" button only).
          function flyTo(id) {
            state.hl = [id];
            state.focus = [id];
            state.mode = "lock";
            orrery.setHighlight([id]);
            orrery.focus([id], "lock");
            writeURL();
          }

          orrery.setSystem(data);

          if (state.hl.length) orrery.setHighlight(state.hl);
          if (state.focus.length) {
            state.mode = resolveFocusMode(state.focus, state.mode);
            orrery.focus(state.focus, state.mode);
          }
          writeURL();

          panelHandle = buildPanel(data, animObjects, {
            onFocus: (b) => highlightOnly(b ? b.id : data.star.id),
            onFlyTo: (b) => flyTo(b ? b.id : data.star.id),
            onRouteAction: (action, bodyId) => {
              if (action === "start") {
                routeSel.phase = "picking";
                routeSel.from = bodyId;
                orrery.setRoutes([]);
                panelHandle.setRouteState({ phase: "picking", fromId: bodyId });
              } else if (action === "cancel") {
                routeSel.phase = "idle";
                routeSel.from = null;
                orrery.setRoutes([]);
                panelHandle.setRouteState({ phase: "idle", fromId: null });
              } else if (action === "finish") {
                drawRoutesFor(routeSel.from, bodyId);
                routeSel.phase = "idle";
                routeSel.from = null;
                panelHandle.setRouteState({ phase: "idle", fromId: null });
              }
            },
          });
          buildPlaybackWidget({
            onTimeScale: (ts) => orrery.setTimeScale(ts),
            onPause: () => orrery.pause(),
            onResume: () => orrery.resume(),
          });
        }
      }
    </script>
    <script>
      const _sse = new EventSource("./sse");
      _sse.onmessage = () => location.reload();
      _sse.onerror = () => _sse.close();
    </script>
  </body>
</html>
