<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Canvas Viewer</title>
    <link rel="icon" href="./favicon.ico">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000;
        overflow: hidden;
        touch-action: none;
      }
      canvas {
        display: block;
      }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        color: #888;
        font-family: monospace;
        font-size: 0.85rem;
        letter-spacing: 0.1em;
      }
      #top-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
        z-index: 15;
        pointer-events: none;
      }
      #nav-links {
        display: flex;
        gap: 0.375rem;
        flex-shrink: 0;
        pointer-events: auto;
      }
      .nav-link {
        padding: 0.375rem 0.625rem;
        background: rgba(0, 0, 0, 0.75);
        border: 1px solid #2a2a3a;
        border-radius: 0.25rem;
        color: #ccc;
        font-family: monospace;
        font-size: 0.6875rem;
        letter-spacing: 0.05em;
        text-decoration: none;
      }
      .nav-link:hover {
        border-color: #555;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div id="loading">LOADING...</div>
    <script type="module">
      import {
        buildRouteViewModel,
        buildViewModel,
        EndState,
        generateSolarSystem,
        getBestRoutes,
        parseViewState,
        resolveFocusMode,
        serializeViewState,
      } from "./star-seeder.bundle.js";
      import { createCanvasOrrery } from "./orrery-2d.bundle.js";
      import { loadSystem, saveSystem } from "./storage.js";
      import { buildPanel } from "./panel.js";
      import { buildPlaybackWidget } from "./playback-widget.js";

      const numericId = parseInt(location.hash.slice(1), 10);
      if (isNaN(numericId)) {
        location.href = "./index.html";
      } else {
        const topBar = document.createElement("div");
        topBar.id = "top-bar";

        const nav = document.createElement("div");
        nav.id = "nav-links";

        const genLink = document.createElement("a");
        genLink.className = "nav-link";
        genLink.href = "./index.html";
        genLink.textContent = "← SEEDS";

        const viewLink = document.createElement("a");
        viewLink.className = "nav-link";
        viewLink.href = `./3d.html#${numericId}`;
        viewLink.textContent = "⇄ 3D VIEW";

        nav.append(genLink, viewLink);
        topBar.appendChild(nav);
        document.body.appendChild(topBar);

        const loadingEl = document.getElementById("loading");
        let data = loadSystem(numericId);
        if (!data) {
          try {
            data = generateSolarSystem({ seed: numericId });
            saveSystem(data);
          } catch (err) {
            if (loadingEl) loadingEl.textContent = `Error: ${err.message}`;
          }
        }
        if (data) {
          if (loadingEl) loadingEl.remove();
          const animObjects = buildViewModel(data, 0);
          const knownIds = new Set(animObjects.map((o) => o.id));
          const initial = parseViewState(location.search);
          const state = {
            hl: initial.hl.filter((id) => knownIds.has(id)),
            focus: initial.focus.filter((id) => knownIds.has(id)),
            mode: initial.mode,
          };

          function writeURL() {
            const qs = serializeViewState(state);
            const url = location.pathname + (qs ? "?" + qs : "") +
              location.hash;
            history.replaceState(null, "", url);
          }

          const orrery = createCanvasOrrery(document.body, {
            onPick: (id) => {
              highlightOnly(id);
              pickForRoute(id);
              const obj = animObjects.find((o) => o.id === id);
              if (obj) {
                document.dispatchEvent(
                  new CustomEvent("bodySelected", { detail: obj }),
                );
              }
            },
            onLockBreak: () => {
              if (state.focus.length === 0) return;
              state.mode = "frame";
              writeURL();
            },
            onRoutePick: (t) => {
              if (t.kind === "node") {
                console.log(`[route ${t.routeId}] node ${t.node.id} (${t.node.kind}) ` +
                  `day ${t.node.time.toFixed(0)}, Δv ${t.node.deltaV.toFixed(2)} km/s`);
              } else {
                console.log(`[route ${t.routeId}] leg ${t.leg.fromBodyId} -> ${t.leg.toBodyId} ` +
                  `tof ${t.leg.timeOfFlight.toFixed(0)} d, Δv ${t.leg.deltaV.toFixed(2)} km/s`);
              }
            },
          });

          const routeSel = { from: null, to: null };

          function drawRouteFor(fromId, toId) {
            try {
              const routes = getBestRoutes(
                data,
                { obj: fromId, type: EndState.Orbit },
                { obj: toId, type: EndState.Orbit },
              );
              const route = routes[0];
              if (!route) {
                orrery.setRoute(null);
                console.warn(`No route found ${fromId} -> ${toId}`);
                return;
              }
              orrery.setRoute(buildRouteViewModel(data, route));
            } catch (err) {
              orrery.setRoute(null);
              console.warn(`Route error: ${err.message}`);
            }
          }

          function pickForRoute(id) {
            if (id === data.star.id) return; // star is not a valid endpoint
            if (!routeSel.from) {
              routeSel.from = id;
              orrery.setRoute(null);
            } else if (!routeSel.to && id !== routeSel.from) {
              routeSel.to = id;
              drawRouteFor(routeSel.from, routeSel.to);
            } else {
              // both set (or re-pick) -> start a new selection
              routeSel.from = id;
              routeSel.to = null;
              orrery.setRoute(null);
            }
          }

          // Highlight a body without moving the camera (canvas click / panel row select).
          function highlightOnly(id) {
            state.hl = [id];
            state.focus = [];
            orrery.setHighlight([id]);
            writeURL();
          }

          // Highlight AND fly/lock the camera to a body (the "Fly to" button only).
          function flyTo(id) {
            state.hl = [id];
            state.focus = [id];
            state.mode = "lock";
            orrery.setHighlight([id]);
            orrery.focus([id], "lock");
            writeURL();
          }

          orrery.setSystem(data);

          if (state.hl.length) orrery.setHighlight(state.hl);
          if (state.focus.length) {
            state.mode = resolveFocusMode(state.focus, state.mode);
            orrery.focus(state.focus, state.mode);
          }
          writeURL();

          buildPanel(data, animObjects, {
            onFocus: (b) => highlightOnly(b ? b.id : data.star.id),
            onFlyTo: (b) => flyTo(b ? b.id : data.star.id),
          });
          buildPlaybackWidget({
            onTimeScale: (ts) => orrery.setTimeScale(ts),
            onPause: () => orrery.pause(),
            onResume: () => orrery.resume(),
          });
        }
      }
    </script>
    <script>
      const _sse = new EventSource("./sse");
      _sse.onmessage = () => location.reload();
      _sse.onerror = () => _sse.close();
    </script>
  </body>
</html>
