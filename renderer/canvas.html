<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Canvas Viewer</title>
    <link rel="icon" href="/favicon.ico">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #000; overflow: hidden; touch-action: none; }
      canvas { display: block; }
      #loading {
        position: fixed; inset: 0; display: flex;
        align-items: center; justify-content: center;
        background: #000; color: #888;
        font-family: monospace; font-size: 0.85rem; letter-spacing: 0.1em;
      }
      #view-link {
        position: fixed; top: 16px; left: 16px; z-index: 10;
        padding: 6px 10px; background: rgba(0,0,0,0.75);
        border: 1px solid #2a2a3a; border-radius: 4px;
        color: #ccc; font-family: monospace; font-size: 11px;
        letter-spacing: 0.05em; text-decoration: none;
      }
      #view-link:hover { border-color: #555; color: #fff; }
    </style>
  </head>
  <body>
    <div id="loading">LOADING...</div>
    <script type="module">
      import { buildSystem } from "/canvas-scene.js";
      import { loadSystem, saveSystem } from "/storage.js";

      const parts = window.location.pathname.split("/");
      const numericId = parseInt(parts[2], 10);
      if (!parts[2] || isNaN(numericId)) {
        location.href = "/seeds";
      } else {
        const link = document.createElement("a");
        link.id = "view-link";
        link.href = `/seed/${numericId}`;
        link.textContent = "→ 3D VIEW";
        document.body.appendChild(link);

        const loadingEl = document.getElementById("loading");
        let data = loadSystem(numericId);
        if (!data) {
          try {
            const res = await fetch(`/generate?seed=${numericId}`);
            if (!res.ok) throw new Error(await res.text());
            data = await res.json();
            saveSystem(data);
          } catch (err) {
            loadingEl.textContent = `Error: ${err.message}`;
          }
        }
        if (data) {
          loadingEl.remove();
          buildSystem(data);
        }
      }
    </script>
    <script>
      const _sse = new EventSource("/sse");
      _sse.onmessage = () => location.reload();
      _sse.onerror = () => _sse.close();
    </script>
  </body>
</html>
