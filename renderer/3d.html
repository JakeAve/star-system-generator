<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Seed Viewer</title>
    <link rel="icon" href="./favicon.ico">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000;
        overflow: hidden;
      }
      canvas {
        display: block;
      }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        color: #888;
        font-family: monospace;
        font-size: 0.85rem;
        letter-spacing: 0.1em;
      }
      #top-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
        z-index: 15;
        pointer-events: none;
      }
      #nav-links {
        display: flex;
        gap: 0.375rem;
        flex-shrink: 0;
        pointer-events: auto;
      }
      .nav-link {
        padding: 0.375rem 0.625rem;
        background: rgba(0, 0, 0, 0.75);
        border: 1px solid #2a2a3a;
        border-radius: 0.25rem;
        color: #ccc;
        font-family: monospace;
        font-size: 0.6875rem;
        letter-spacing: 0.05em;
        text-decoration: none;
      }
      .nav-link:hover {
        border-color: #555;
        color: #fff;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="loading">LOADING...</div>
    <script type="module">
      import { generateSolarSystem } from "./generator.bundle.js";
      import { buildSystem } from "./scene.js";
      import { loadSystem, saveSystem } from "./storage.js";

      const numericId = parseInt(location.hash.slice(1), 10);
      if (isNaN(numericId)) {
        location.href = "./index.html";
      } else {
        const topBar = document.createElement("div");
        topBar.id = "top-bar";

        const nav = document.createElement("div");
        nav.id = "nav-links";

        const genLink = document.createElement("a");
        genLink.className = "nav-link";
        genLink.href = "./index.html";
        genLink.textContent = "← SEEDS";

        const viewLink = document.createElement("a");
        viewLink.className = "nav-link";
        viewLink.href = `./2d.html#${numericId}`;
        viewLink.textContent = "⇄ 2D VIEW";

        nav.append(genLink, viewLink);
        topBar.appendChild(nav);
        document.body.appendChild(topBar);

        const loadingEl = document.getElementById("loading");
        let data = loadSystem(numericId);
        if (!data) {
          try {
            data = generateSolarSystem({ seed: numericId });
            saveSystem(data);
          } catch (err) {
            loadingEl.textContent = `Error: ${err.message}`;
          }
        }
        if (data) {
          loadingEl.remove();
          buildSystem(data);
        }
      }
    </script>
    <script>
      const _sse = new EventSource("./sse");
      _sse.onmessage = () => location.reload();
      _sse.onerror = () => _sse.close();
    </script>
  </body>
</html>
