<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Saved Seeds</title>
    <link rel="icon" href="./favicon.ico">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000;
        color: #ccc;
        font-family: monospace;
        min-height: 100vh;
        padding: 40px 48px;
      }
      #back {
        display: inline-block;
        margin-bottom: 32px;
        font-size: 0.75rem;
        color: #555;
        text-decoration: none;
      }
      #back:hover {
        color: #888;
      }
      h1 {
        font-size: 1.1rem;
        letter-spacing: 0.2em;
        color: #fff;
        margin-bottom: 32px;
        font-weight: normal;
      }
      .seed-list {
        display: flex;
        flex-direction: column;
        gap: 2px;
        max-width: 640px;
      }
      .seed-row {
        display: flex;
        align-items: flex-start;
        gap: 16px;
        padding: 8px 12px;
        border: 1px solid transparent;
        text-decoration: none;
        color: #ccc;
      }
      .seed-row:hover {
        border-color: #333;
        background: rgba(255, 255, 255, 0.03);
      }
      .seed-num {
        color: #fff;
        font-size: 0.95rem;
        min-width: 140px;
        padding-top: 1px;
      }
      .seed-details {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .seed-meta {
        font-size: 0.75rem;
        color: #666;
      }
      .seed-meta-2 {
        font-size: 0.75rem;
        color: #444;
      }
      .empty {
        font-size: 0.85rem;
        color: #555;
      }
      .empty a {
        color: #6ab0d4;
        text-decoration: none;
      }
      .empty a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <a href="./index.html" id="back">← GENERATOR</a>
    <h1>SAVED SEEDS</h1>
    <div id="list" class="seed-list"></div>
    <script type="module">
      import { listSeeds } from "./storage.js";

      const listEl = document.getElementById("list");
      const seeds = listSeeds();

      if (seeds.length === 0) {
        listEl.innerHTML =
          '<p class="empty">No seeds saved yet. <a href="./index.html">Generate one.</a></p>';
      } else {
        const ARCHETYPE_LABEL = {
          dynamicallyCold: "cold",
          warmJupiter: "warm jupiter",
          hotJupiter: "hot jupiter",
          grandTack: "grand tack",
          compactMultiplanet: "compact",
        };

        seeds.sort((a, b) => a.seed - b.seed);
        for (const sys of seeds) {
          const objects = sys.objects ?? [];
          const planets = objects.filter((o) => o.type !== "asteroid");
          const planetCount = planets.length;
          const asteroidCount = objects.filter((o) =>
            o.type === "asteroid"
          ).length;
          const moonCount = objects.reduce(
            (n, o) => n + (o.moons?.length ?? 0),
            0,
          );
          const orbits = planets.map((o) => o.orbitRadius).filter((r) =>
            r > 0
          );
          const auRange = orbits.length
            ? `${Math.min(...orbits).toFixed(1)}–${
              Math.max(...orbits).toFixed(1)
            } AU`
            : null;
          const hz = sys.star?.habitableZoneAU;
          const hzStr = hz != null ? `HZ ${hz.toFixed(1)} AU` : null;
          const archetype = ARCHETYPE_LABEL[sys.migrationHistory] ??
            sys.migrationHistory;

          const line1 = [
            `${sys.star?.spectralType ?? "?"}-type star`,
            archetype,
          ].filter(Boolean).join(" · ");

          const line2 = [
            `${planetCount} planet${planetCount !== 1 ? "s" : ""}`,
            moonCount > 0
              ? `${moonCount} moon${moonCount !== 1 ? "s" : ""}`
              : null,
            asteroidCount > 0
              ? `${asteroidCount} asteroid${
                asteroidCount !== 1 ? "s" : ""
              }`
              : null,
            auRange,
            hzStr,
          ].filter(Boolean).join(" · ");

          const a = document.createElement("a");
          a.className = "seed-row";
          a.href = `./seed.html#${sys.seed}`;

          const numSpan = document.createElement("span");
          numSpan.className = "seed-num";
          numSpan.textContent = `SEED ${sys.seed}`;

          const details = document.createElement("span");
          details.className = "seed-details";

          const metaSpan = document.createElement("span");
          metaSpan.className = "seed-meta";
          metaSpan.textContent = line1;

          const meta2Span = document.createElement("span");
          meta2Span.className = "seed-meta-2";
          meta2Span.textContent = line2;

          details.append(metaSpan, meta2Span);
          a.append(numSpan, details);
          listEl.appendChild(a);
        }
      }
    </script>
    <script>
      const _sse = new EventSource("./sse");
      _sse.onmessage = () => location.reload();
      _sse.onerror = () => _sse.close();
    </script>
  </body>
</html>
